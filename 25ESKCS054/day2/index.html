<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="body">
    <h1 class="we">Registration Form</h1>

    <form>

        <h3><img src="person.svg" width="20" height="20">Name</h3>
        <input type="text" placeholder="Enter Name" required>

        <h3><img src="envelope.svg" width="20" height="20">Email</h3>
        <input type="email" placeholder="Enter Email" required>

        <h3><img src="telephone.svg" width="20" height="20">Phone</h3>
        <input type="tel" placeholder="Enter Phone Number" required>

        <h3>Gender</h3>
        <input type="text" placeholder="Enter Gender" required>

        <h3>Date of Birth</h3>
        <input type="date" required>

        <h3>Department</h3>
        <input type="text" placeholder="Enter Department" required>

        <h3>Password</h3>
        <input type="password" placeholder="Enter Password" required>

        <h3>Confirm Password</h3>
        <input type="password" placeholder="Confirm Password" required>

        <br><br>

        <input type="submit" value="Submit">
        

    </form>

</div>

</body>
</html>
